name: Build

on: [push]

jobs:
  Build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]

    steps:
    - name: Obtain latest version of the repository
      uses: actions/checkout@v1
    - name: Set up Python 3
      uses: actions/setup-python@v4
      with:
        python-version: '3.11.x'
    - name: Install requirements with PIP
      run: pip install -r requirements.txt
    - name: Install pyinstaller
      run: pip install pyinstaller
    - name: Write build info to file
      run: '@{ commit = "${{ github.sha }}".Substring(0, 7); branch = "${{ github.ref_name }}" } | ConvertTo-Json | Set-Content build_info.json'
    - name: Build Open Shop Channel Downloader
      run: pyinstaller oscdl.spec
    - name: Write installer patch notes
      run: |
        $commit = "${{ github.sha }}".Substring(0, 7)
        $lines = "Open Shop Channel Downloader by dhtdht020",
                 "Development build #${{ github.run_number }} (${{ github.ref_name }}@$commit)",
                 ("Built " + (Get-Date -Format "MMMM d, yyyy")),
                 "",
                 "https://github.com/dhtdht020/osc-dl",
                 "",
                 "Open Source Software. GPL 3.0."
        $lines | Set-Content installer\patchnotes.txt
    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress
    - name: Compile installer
      run: |
        $version = python -c "import updater; print(updater.current_version())"
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer\setup.iss
    - name: Publish Build Artifacts
      uses: actions/upload-artifact@master
      with:
        name: '${{ matrix.os }}-GUI'
        path: dist/oscdl
    - name: Publish Installer Artifact
      uses: actions/upload-artifact@master
      with:
        name: '${{ matrix.os }}-installer'
        path: dist/installer/oscdl-setup.exe
    - uses: dhtdht020/openshop-status-discord@master
      name: Send discord webhook
      if: always()
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
        status: ${{ job.status }}
        title: "Build #${{ github.run_number }} of OSCDL: ${{ job.status }}"
        description: "New OSCDL development build! #${{ github.run_number }} [Download Build](https://github.com/dhtdht020/osc-dl/actions/runs/${{ github.run_id }})"
        nodetail: true
        username: OSCDL

